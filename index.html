<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <h1>Save Our Wildlife</h1>

        <div class="video-wrapper">
            <video id="wildlifeVideo" controls aria-label="Promotional wildlife conservation video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag. Please update your browser to view this content.
            </video>
        </div>

        <button id="toggleBtn" class="control-btn" aria-live="polite">
            Play Video
        </button>

        <p class="description">
            Discover the critical ecosystems under threat and learn how our dedicated field teams are fighting day and night to shield endangered species from extinction. Your awareness is their survival.
        </p>
    </main>

    <script src="script.js"></script>
</body>
</html>
